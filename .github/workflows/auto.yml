name: automatizácia

on:
  schedule:
    - cron: '30 14,15 * * *'  # 14:30 a 15:30 UTC denne (pokryje CET aj CEST)
  workflow_dispatch:


jobs:
  automatizacia:
    runs-on: ubuntu-latest
    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
    steps:
      - name: 📦 Checkout kód
        uses: actions/checkout@v4

      - name: 🐍 Nastavenie Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 💾 Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📋 Inštalácia Python závislostí
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 🌐 Inštalácia Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 🤖 Spustenie automatizácie
        run: |
          echo "🚀 Kontrola času v Europe/Bratislava..."
          HOUR=$(TZ='Europe/Bratislava' date +%H)
          MIN=$(TZ='Europe/Bratislava' date +%M)
          TIME="${HOUR}${MIN}"
          echo "Lokálny čas: ${HOUR}:${MIN}"
    
          if [ "$TIME" \< "1630" ]; then
            echo "❌ Je menej ako 16:30 v SK čase, končím bez spustenia jobu."
            exit 0
          fi
    
          echo "✅ Je >= 16:30 v SK čase, spúšťam..."
          python auto.py
          echo "✅ Automatizácia dokončená!"


      - name: 📸 Upload screenshots pri chybe
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: "*.png"
          retention-days: 7

      - name: 📄 Upload HTML súborov pri chybe
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-html
          path: "*.html"
          retention-days: 7

      - name: ✅ Úspešné dokončenie
        if: success()
        run: |
          echo "🎉 Automatizácia úspešne dokončená!"
          echo "📅 Čas: $(date)"
          echo "📊 Využitie GitHub Actions minút: ~2-3 minúty"
